<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload CSV</title>
   <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- jQuery (required for UI) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
        }

        .frame {
            width: 400px;
            margin: 100px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        .title {
            margin-bottom: 20px;
        }

        .dropzone {
            border: 2px dashed #aaa;
            padding: 20px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .upload-input {
            margin-top: 10px;
        }

        .btn {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background: #218838;
        }
    </style>
</head>

<body>

<form action="/predict" method="post" enctype="multipart/form-data">

    <h1 class="title">Upload CSV for Prediction</h1>

    <div class="frame">
        <div class="center">
            <h2>Drop file to upload</h2>

            <div class="dropzone">
                <img src="https://100dayscss.com/codepen/upload.svg" class="upload-icon" width="50" />
                <br><br>
                <input type="file" class="upload-input" name="file" accept=".csv">
            </div>

            <button type="submit" class="btn">Upload File</button>
        </div>
    </div>

</form>

</body>
</html>
